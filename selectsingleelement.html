<!DOCTYPE html>
<html>
<head>
<title>Single Element Selection</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<p>Paragraph 1</p>
<p>Paragraph 2</p>
<p>Paragraph 3</p>

<button id="btn">Get Second Paragraph</button>

<script>
$(document).ready(function(){
    $("#btn").click(function(){
        var element = $("p").eq(1);   // gets second paragraph
        element.css("color","cyan");
    });
});
</script>

</body>
</html>
