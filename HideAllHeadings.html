<!DOCTYPE html>
<html>
<head>
<title>Hide Headings and Mouse Position</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<h1>Heading 1</h1>
<h2>Heading 2</h2>
<h3>Heading 3</h3>

<p id="pos"></p>

<script>
$(document).ready(function(){

    // Hide headings when clicked
    $("h1, h2, h3, h4, h5, h6").click(function(){
        $(this).hide();
    });

    // Show mouse position
    $(document).mousemove(function(event){
        $("#pos").text(
            "Mouse Position - Left: " + event.pageX +
            " Top: " + event.pageY
        );
    });

});
</script>
</body>
</html>
